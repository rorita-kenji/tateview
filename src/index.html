<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>縦view</title>
  <!-- iPad/iPhone: ホーム画面追加時に Safari のアドレスバー・タブを出さない -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="縦view" />
  <meta name="theme-color" content="#f7f5ef" />
  <meta name="application-name" content="縦view" />
  <!-- display:standalone（iOS 16.4+ のホーム画面 Web App 向け）。start_url は追加時の URL が使われる -->
  <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22%E7%B8%A6view%22%2C%22short_name%22%3A%22%E7%B8%A6view%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f7f5ef%22%2C%22theme_color%22%3A%22%23f7f5ef%22%7D" />
  <link rel="stylesheet" href="./styles.css" />
  <!-- Google tag (gtag.js) — https のみ（file://・http ローカルでは読み込まない） -->
  <script>
    if (location.protocol === 'https:') {
      var script = document.createElement('script');
      script.async = true;
      script.src = 'https://www.googletagmanager.com/gtag/js?id=G-FEWVNH23P4';
      document.head.appendChild(script);

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FEWVNH23P4');
    }
  </script>
</head>
<body>
  <!-- 上部メニュー(1段): ロゴ / 開く / ファイル情報 / 更新|自動更新 / 検索 / 体裁 / 字・行 / 校正 -->
  <div id="topbar">
    <span class="brand">縦view</span>
    <button id="openFsBtn">開く</button>
    <input id="fileInput" type="file" accept=".txt,text/plain" hidden />
    <span id="fileMeta" class="hint" title="">ファイル未読み込み</span>
    <button id="reloadBtn" title="自動更新できない環境向け。同じ原稿を再読込（位置は維持）">更新</button>
    <span id="autoLabel" class="badge" hidden>自動更新</span>

    <span class="sep"></span>
    <input id="searchInput" type="text" placeholder="検索" />
    <button id="searchBtn" title="検索">🔍</button>
    <button id="searchNext" title="次の一致">次</button>
    <button id="searchPrev" title="前の一致">前</button>
    <span id="searchCount" class="hint"></span>

    <span class="sep"></span>
    <select id="presetSelect" title="体裁"></select>
    <label>字<input id="cpc" type="number" min="1" max="60" /></label>
    <label>行<input id="cpp" type="number" min="1" max="60" /></label>
    <button id="togglePanel" class="primary" title="校正パネル">校正</button>
  </div>

  <div id="toast"></div>
  <div id="dropHint">ここにテキストファイルをドロップ</div>

  <main>
    <div id="sidebar">
      <!-- 章/話記号: サムネ有無に関わらず常時表示（1行） -->
      <div id="markBar" class="mark-bar" title="行頭（半角/全角スペースのみ可）の見出し記号">
        <label class="mark-ch">章記号：<input id="chapterMark" type="text" value="#" maxlength="16" spellcheck="false" autocomplete="off" /></label>
        <label class="mark-ep">話記号：<input id="episodeMark" type="text" value="##" maxlength="16" spellcheck="false" autocomplete="off" /></label>
      </div>
      <div id="thumbs" title="ドラッグでページ移動"></div>
      <!-- 左メニュー: ページ移動 + 表示設定 -->
      <div id="controls">
        <div class="ctrl-row nav">
          <button id="nextBtn">◀ 次</button>
          <button id="prevBtn">前 ▶</button>
        </div>
        <div class="ctrl-row status">
          <label>ページ<input id="jumpInput" type="number" min="1" /></label>
          <span>/ <span id="totalPages">0</span></span>
        </div>
        <div class="ctrl-row status">
          <span><span id="pageChars">0</span>文字 / 総文字<span id="totalChars">0</span></span>
          <span id="progress"></span>
        </div>
        <hr />
        <div class="ctrl-row checks">
          <label><input id="kinsoku" type="checkbox" />禁則</label>
          <label><input id="burasage" type="checkbox" />ぶら下げ</label>
          <label><input id="showRuby" type="checkbox" />ルビ</label>
          <label><input id="halfColor" type="checkbox" />半角色</label>
          <label><input id="spaceColor" type="checkbox" />空白</label>
          <label><input id="gridLines" type="checkbox" />升目</label>
        </div>
        <div class="ctrl-row">
          <label>テーマ<select id="themeSelect"><option value="light">ライト</option><option value="dark">ダーク</option></select></label>
        </div>
        <div class="ctrl-row font-row">
          <select id="fontSelect" title="書体"><option value="mincho">明朝</option><option value="gothic">ゴシック</option></select>
          <select id="fontSize" title="字級"></select>
        </div>
        <div id="appCredit" class="app-credit">
          <span>v1.0</span>
          <span>by <a href="https://yamamori-yamori.github.io/mypage/" target="_blank" rel="noopener noreferrer">やまもりやもり</a></span>
        </div>
      </div>
    </div>

    <div id="pageWrap"><div id="page"></div></div>

    <aside>
      <div class="section">
        <h2>校正ワーニング <span id="warnTotal" class="hint"></span></h2>
        <div class="warn-toggles" title="多用するときはオフにできる">
          <label><input id="fullwidthAlpha" type="checkbox" />全角英字</label>
          <label><input id="fullwidthDigit" type="checkbox" />全角数字</label>
        </div>
        <div><button id="warnNext">▽次</button> <button id="warnPrev">前△</button></div>
      </div>
      <ul id="warnList"></ul>
    </aside>
  </main>

  <!-- DEV: モジュール直読み。ビルド後は単一HTMLに結合される。 -->
  <script>window.__createWorker = () => new Worker('./worker.js', { type: 'module' });</script>
  <script type="module" src="./main.js"></script>
</body>
</html>
